version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: agentmarket-db
    environment:
      POSTGRES_USER: agentmarket
      POSTGRES_PASSWORD: agentmarket_secret
      POSTGRES_DB: agentmarket
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: agentmarket-redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agentmarket-api
    environment:
      DATABASE_URL: postgresql://agentmarket:agentmarket_secret@postgres:5432/agentmarket
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-production-jwt-secret
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agentmarket-ui
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
